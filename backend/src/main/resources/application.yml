spring:
  application:
    name: commerce-api

  # MySQL (Docker로 실행: docker compose up -d)
  # 시크릿은 OS 환경변수로 주입(12-factor). 로컬은 backend/.env + run.ps1로 로드. (값 없으면 기동 실패 = 의도)
  datasource:
    url: jdbc:mysql://localhost:3307/commerce?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Flyway: 버전관리된 SQL(db/migration/V*.sql)로 스키마를 통제.
  flyway:
    enabled: true
    baseline-on-migrate: true   # 기존(비어있지 않은) DB는 V1로 baseline 표시 후 V2+만 적용. 새 DB는 V1부터 실행.
    baseline-version: 1

  jpa:
    hibernate:
      ddl-auto: validate        # 스키마는 Flyway가 만든다 → Hibernate는 엔티티↔스키마 일치만 검증(불일치 시 기동 실패)
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100   # 지연 로딩 컬렉션/프록시를 IN 쿼리로 묶어 N+1 완화 (목록 조회 등)
    show-sql: true

# JWT 설정. secret은 OS 환경변수(JWT_SECRET)로 주입 — 코드/깃에 시크릿을 두지 않는다.
jwt:
  secret: ${JWT_SECRET}
  access-token-validity-ms: 1800000      # 30분
  refresh-token-validity-ms: 1209600000  # 14일